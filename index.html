<!doctype html>
<html lang="en">
  <head>
    <title>InvoiceGen by Noru</title>
<meta name="author" content="Noru" />
<meta name="description" content="Free invoice generator for freelancers — logo, tax, multi-currency, live preview & PDF download. No signup needed." />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div id="form-section">
        <label for="logo-upload">Business Logo:</label>
<input type="file" id="logo-upload" accept="image/*" />
        <label for="name">Name:</label>
        <input type="text" id="name" />
        <label for="business-name">Business Name:</label>
        <input type="text" id="business-name" />
        <label for="email">Email:</label>
        <input type="email" id="email" />
        <label for="client-name">Client Name:</label>
        <input type="text" id="client-name" />
        <label for="client-business-name">Client Business Name:</label>
        <input type="text" id="client-business-name" />
        <label for="client-email">Client Email:</label>
        <input type="email" id="client-email" />
        <label for="invoice-number">Invoice Number:</label>
        <input type="text" id="invoice-number" />
        <label for="invoice-date">Invoice Date:</label>
        <input type="date" id="invoice-date" />
        <label for="due-date">Due Date:</label>
        <input type="date" id="due-date" />
        <div id="item-rows">
          <div class="item-row">
            <label>Item Description:</label>
            <input type="text" class="item-description" />
            <label>Item Quantity:</label>
            <input type="number" class="item-quantity" />
            <label>Item Price:</label>
            <input type="number" class="item-price" step="0.01" />
          

          </div>
        </div>
        <label for="currency">Currency:</label>
        <select id="currency">
          <option value="USD">USD</option>
          <option value="EUR">EUR</option>
          <option value="GBP">GBP</option>
          <option value="JPY">JPY</option>
          <option value="AUD">AUD</option>
          <option value="CAD">CAD</option>
          <option value="CHF">CHF</option>
          <option value="CNY">CNY</option>
          <option value="SEK">SEK</option>
          <option value="NZD">NZD</option>
        </select>
<label for="tax">Tax (%):</label>
<input type="number" id="tax" placeholder="0" step="0.1" />
        <button id="add-item">Add Item</button>
        <label for="notes">Notes / Payment Terms:</label>
<textarea id="notes" rows="3" placeholder="e.g. Payment due within 30 days..."></textarea>
          <button id="print-btn">Download Invoice</button>
      </div>

    <div id="preview-section">
 <div id="invoice-paper">
  <p id="invoice-footer">Generated by InvoiceGen</p>
  <!-- TOP: Logo + Your Details -->
  <div id="invoice-header">
    <div id="sender-info">
      <p id="preview-email"></p>
      <img id="preview-logo" src="" style="display:none; max-height: 80px;" />
      <h2 id="preview-name"></h2>
      <p id="preview-business"></p>
    </div>
    <div id="invoice-meta">
      <p id="preview-invoice-number"></p>
      <p id="preview-invoice-date"></p>
      <p id="preview-due-date"></p>
    </div>
  </div>

  <!-- BILL TO -->
  <div id="bill-to-section">
    <p id="preview-client-business"></p>
<p id="preview-client-email"></p>
    <!-- ITEMS TABLE -->
<table id="preview-table">
  <thead>
    <tr>
      <th>Description</th>
      <th>Qty</th>
      <th>Rate</th>
      <th>Total</th>
    </tr>
  </thead>
  <tbody id="preview-items">
  </tbody>
</table>
    <p id="preview-client-name"></p>
  </div>

  <!-- TOTAL -->
  <p id="preview-total"></p>
  <p id="preview-notes"></p>
</div>
 
</div>
    <script src="script.js"></script>
  </body>
</html>
